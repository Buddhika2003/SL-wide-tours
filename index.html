<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SL Wide Tours</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>

  <main class="card">

    <section class="hero-section" id="home">

      <img src="images/back.jpg" alt="SL Wide Tours Background" class="hero-bg" />

      <div class="logo-card">
        <img src="images/logo.jpeg" alt="SL Wide Tours Logo" />
      </div>

      <div class="award-area">
        <img src="images/tripadvisor.png" alt="Tripadvisor Award" class="award-img" />

        <a href="#contact" class="down-btn">
          <i class="fa-solid fa-chevron-down"></i>
        </a>

        <img src="images/awards.png" alt="World Travel Awards" class="award-img" />
      </div>

    </section>

    <section class="contact-section" id="contact">

      <div class="icon-column">
        <div class="side-icon"><i class="fa-solid fa-phone"></i></div>
        <div class="side-icon"><i class="fa-solid fa-envelope"></i></div>
        <div class="side-icon"><i class="fa-solid fa-globe"></i></div>
      </div>

      <div class="details-column">

        <div class="detail-box">
          <a href="tel:+94718873231">+94718873231</a>

          <a href="https://wa.me/94718651314" target="_blank">
            +94718651314
            <i class="fa-brands fa-whatsapp whatsapp"></i>
          </a>
        </div>

        <div class="detail-box">
          <a href="mailto:srilankawidetours@gmail.com">
            srilankawidetours@gmail.com
          </a>

          <a href="mailto:booking@srilankawidetours.com">
            booking@srilankawidetours.com
          </a>
        </div>

        <div class="detail-box">
          <a href="https://www.srilankawidetours.com" target="_blank">
            www.srilankawidetours.com
          </a>
        </div>

      </div>

      <div class="line"></div>

      <div class="founder-column">
        <img src="images/founder.jpg" alt="Darshana Jayawardana" class="founder-img" />

        <h1>Darshana<br>Jayawardana</h1>
        <p>The Founder</p>

        <img src="images/logo.jpeg" alt="SL Wide Tours Logo" class="small-logo" />

        <a href="#home" class="up-btn">
          <i class="fa-solid fa-chevron-up"></i>
        </a>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
